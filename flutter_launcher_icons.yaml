flutter_launcher_icons:
  android: true
  ios: true
  image_path: "Focus_Today_icon.png"

  # Android specific - circular icon (adaptive icons)
  adaptive_icon_foreground: "Focus_Today_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground_inset: 0

  # Minimum SDK for adaptive icons
  min_sdk_android: 21

  # Remove alpha channel for iOS (required)
  remove_alpha_ios: true

  # Web configuration
  web:
    generate: false
