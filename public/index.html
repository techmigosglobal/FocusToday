<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Today</title>
  <meta name="description" content="Focus Today — Your source for verified news, stories, and community updates.">
  <meta property="og:title" content="Focus Today">
  <meta property="og:description" content="Your source for verified news, stories, and community updates.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://crii-focus-today.web.app">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a; color: #e0e0e0;
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 24px;
      padding: 40px 20px;
    }
    .logo { font-size: 48px; font-weight: 800; color: #ff6b35; }
    .tagline { font-size: 18px; color: #888; text-align: center; max-width: 400px; }
    .cta-btn {
      display: inline-block; padding: 14px 32px; background: #ff6b35;
      color: white; text-decoration: none; border-radius: 12px;
      font-weight: 700; font-size: 16px; margin: 6px;
      transition: background 0.2s;
    }
    .cta-btn:hover { background: #e55a28; }
    .footer { margin-top: 60px; color: #444; font-size: 13px; }
  </style>
</head>
<body>
  <div class="logo">📺 Focus Today</div>
  <p class="tagline">Your source for verified news, stories, and community updates from Focus Today.</p>
  <div>
    <a class="cta-btn" href="#">Download for Android</a>
    <a class="cta-btn" href="#">Download for iOS</a>
  </div>
  <p class="footer">&copy; 2026 Focus Today. All rights reserved.</p>
</body>
</html>
